<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Number Jump - 完全版V5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="lobby-screen" class="container">
    <h1 class="game-title">Number Jump</h1>

    <div class="card ranking">
      <h2>🏆 ランキング TOP 5</h2>
      <ul id="ranking-list">読み込み中...</ul>
    </div>
    
    <div class="card my-info">
      <h2>あなたのID: <span id="my-id-display" class="id-text">生成中...</span></h2>
      <p style="font-size: 16px; font-weight: bold; margin: 8px 0;">🏆 あなたの順位: <span id="my-rank" class="highlight-text">-</span> 位</p>
      <p style="margin: 8px 0;">所持ポイント: <span id="my-points" class="highlight-text">---</span> pt</p>
      
      <div class="bet-section">
        <p style="margin: 0 0 8px 0;">次戦の掛け金: <span id="bet-points" class="highlight-text" style="color:#e74c3c;">---</span> pt (<span id="bet-percent-display">5%</span>)</p>
        <div class="slider-container">
          <span style="font-size: 12px; font-weight: bold;">5%</span>
          <input type="range" id="bet-slider" min="5" max="100" step="5" value="5">
          <span style="font-size: 12px; font-weight: bold;">100%</span>
        </div>
      </div>
    </div>

    <div class="card setup-info">
      <h2>⚔️ 準備</h2>
      <p class="section-subtitle">① 加護の選択 (3つまで)</p>
      <div id="blessing-container" class="blessing-list-vertical"></div>
      
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-top: 15px; border-bottom: 2px solid #ecf0f1; padding-bottom: 3px; margin-bottom: 5px;">
        <p class="section-subtitle" style="margin: 0; border: none; padding: 0;">② デッキ編成 (<span id="deck-total" class="highlight-text">30</span>/30枚)</p>
        <button id="reset-deck-btn" style="width: auto; padding: 4px 10px; font-size: 12px; background-color: #95a5a6; border-radius: 4px;">初期化</button>
      </div>
      <div class="deck-editor" id="deck-grid"></div>
    </div>

    <div class="card match-info">
      <h2>対戦相手のIDを入力</h2>
      <input type="text" id="target-id-input" placeholder="例: 123-456-789" inputmode="numeric">
      <button id="match-btn">対戦を申し込む</button>
      <p id="status-message"></p>
      
      <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ccc; text-align: center;">
        <p style="font-size: 13px; color: #7f8c8d; margin-bottom: 5px;">あなたのID (相手に教えてあげよう)</p>
        <p id="my-id-display-bottom" class="id-text" style="font-size: 24px; margin: 0;">---</p>
      </div>
    </div>
  </div>

  <div id="game-screen" class="game-container" style="display: none;">
    <div class="player-area opponent-area">
      <div class="status-bar">
        <span>相手 HP: <span id="opponent-hp">3</span></span>
        <span id="opp-blessing-msg" style="color: #f1c40f;"></span>
      </div>
      <div class="field-card" id="opponent-field">待機中...</div>
    </div>

    <div class="center-area">
      <p id="game-message">VS</p>
    </div>

    <div class="player-area my-area">
      <div class="field-card" id="my-field">セット中</div>
      
      <div class="action-row">
        <button id="union-btn" class="action-btn">合体(2枚)</button>
        <div id="active-blessings" class="blessing-buttons"></div>
      </div>
      
      <p id="rule-msg" style="font-size: 11px; margin: 2px 0; color: #bdc3c7;">
        ±3判定基準: <span id="last-card">なし</span>
      </p>

      <div class="status-bar my-status">
        <span>あなた HP: <span id="my-hp">3</span></span>
      </div>

      <div class="hand-scroller">
        <div id="my-hand" class="hand-container-horizontal"></div>
      </div>
    </div>
  </div>

  <div id="result-screen" class="container" style="display: none; padding-top: 50px;">
    <h1 id="result-title" style="font-size: 40px;"></h1>
    <p id="result-point-info" style="font-size: 20px; font-weight: bold;"></p>
    <button id="back-lobby-btn" style="margin-top: 30px; background-color: #34495e;">ロビーに戻る</button>
  </div>

  <div id="turn-result-overlay" class="turn-result-overlay" style="display: none;">
    <div class="turn-result-content">
      <h3 id="turn-result-msg"></h3>
      <p style="font-size: 16px; margin: 10px 0;">相手の数字: <span id="turn-opp-card" class="highlight-text" style="color: #ecf0f1;"></span></p>
      <p style="font-size: 16px; margin: 10px 0;">相手の加護: <span id="turn-opp-blessing" class="highlight-text" style="color: #f1c40f;"></span></p>
      <p style="font-size: 12px; margin-top: 25px; color: #bdc3c7; animation: blink 1.5s infinite;">画面をタップして次へ</p>
    </div>
  </div>

  <div id="blessing-confirm-overlay" class="turn-result-overlay" style="display: none;">
    <div class="turn-result-content" style="border-color: #f1c40f; box-shadow: 0 0 25px rgba(241, 196, 15, 0.4);">
      <h3 id="confirm-blessing-name" style="color: #f1c40f; margin-top: 0; margin-bottom: 10px; font-size: 24px; text-shadow: none;"></h3>
      <p id="confirm-blessing-desc" style="font-size: 14px; margin-bottom: 15px; color: #ecf0f1; line-height: 1.4;"></p>
      <p style="font-size: 14px; margin-bottom: 25px; color: white;">残り使用回数: <span id="confirm-blessing-count" class="highlight-text"></span> 回</p>
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button id="cancel-blessing-btn" style="background-color: #7f8c8d; flex: 1; padding: 10px;">戻る</button>
        <button id="use-blessing-btn" style="background-color: #f1c40f; color: black; flex: 1; padding: 10px;">使用する</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
