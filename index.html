<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Number Jump - 完全版V3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="lobby-screen" class="container">
    <h1 class="game-title">Number Jump</h1>

    <div class="card ranking">
      <h2>🏆 ランキング TOP 5</h2>
      <ul id="ranking-list">読み込み中...</ul>
    </div>
    
    <div class="card my-info">
      <h2>あなたのID: <span id="my-id-display" class="id-text">生成中...</span></h2>
      <p style="font-size: 16px; font-weight: bold; margin: 8px 0;">🏆 あなたの順位: <span id="my-rank" class="highlight-text">-</span> 位</p>
      <p style="margin: 8px 0;">所持ポイント: <span id="my-points" class="highlight-text">---</span> pt</p>
      
      <div class="bet-section">
        <p style="margin: 0 0 8px 0;">次戦の掛け金: <span id="bet-points" class="highlight-text" style="color:#e74c3c;">---</span> pt (<span id="bet-percent-display">5%</span>)</p>
        <div class="slider-container">
          <span style="font-size: 12px; font-weight: bold;">5%</span>
          <input type="range" id="bet-slider" min="5" max="100" step="5" value="5">
          <span style="font-size: 12px; font-weight: bold;">100%</span>
        </div>
      </div>
    </div>

    <div class="card setup-info">
      <h2>⚔️ 準備</h2>
      <p class="section-subtitle">① 加護の選択 (3つまで)</p>
      <div id="blessing-container" class="blessing-list-vertical"></div>
      
      <p class="section-subtitle" style="margin-top: 15px;">② デッキ編成 (合計 <span id="deck-total" class="highlight-text">30</span>/30枚)</p>
      <div class="deck-editor" id="deck-grid"></div>
    </div>

    <div class="card match-info">
      <h2>対戦相手のIDを入力</h2>
      <input type="text" id="target-id-input" placeholder="例: 123-456-789" inputmode="numeric">
      <button id="match-btn">対戦を申し込む</button>
      <p id="status-message"></p>
    </div>
  </div>

  <div id="game-screen" class="game-container" style="display: none;">
    <div class="player-area opponent-area">
      <div class="status-bar">
        <span>相手 HP: <span id="opponent-hp">3</span></span>
        <span id="opp-blessing-msg" style="color: #f1c40f;"></span>
      </div>
      <div class="field-card" id="opponent-field">待機中...</div>
    </div>

    <div class="center-area">
      <p id="game-message">VS</p>
    </div>

    <div class="player-area my-area">
      <div class="field-card" id="my-field">セット中</div>
      
      <div class="action-row">
        <button id="union-btn" class="action-btn">合体(2枚)</button>
        <div id="active-blessings" class="blessing-buttons"></div>
      </div>
      
      <p id="rule-msg" style="font-size: 11px; margin: 2px 0; color: #bdc3c7;">
        ±3判定基準: <span id="last-card">なし</span>
      </p>

      <div class="status-bar my-status">
        <span>あなた HP: <span id="my-hp">3</span></span>
      </div>

      <div class="hand-scroller">
        <div id="my-hand" class="hand-container-horizontal"></div>
      </div>
    </div>
  </div>

  <div id="result-screen" class="container" style="display: none; padding-top: 50px;">
    <h1 id="result-title" style="font-size: 40px;"></h1>
    <p id="result-point-info" style="font-size: 20px; font-weight: bold;"></p>
    <button id="back-lobby-btn" style="margin-top: 30px; background-color: #34495e;">ロビーに戻る</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
